<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; scroll-behavior: smooth; }
  body {
    font-family: 'Open Sans', sans-serif;
    color: #1D1D1B;
    background: #fff;
    overflow-x: hidden;
  }
  ::selection { background: #F67F00; color: #fff; }

  /* Reveal-on-scroll */
  .dlm-reveal {
    opacity: 0;
    transform: translateY(24px);
    transition: opacity 0.7s ease, transform 0.7s ease;
  }
  .dlm-reveal.is-visible {
    opacity: 1;
    transform: translateY(0);
  }

  /* Nav link underline */
  .dlm-nav-link::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0;
    width: 0; height: 2px;
    background: #F67F00;
    transition: width 0.3s;
  }
  .dlm-nav-link:hover::after { width: 100%; }

  .dlm-cta-mini:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 22px rgba(246,127,0,0.5);
  }

  .dlm-btn-primary {
    transition: transform 0.2s, box-shadow 0.2s, background 0.2s;
  }
  .dlm-btn-primary:hover {
    transform: translateY(-3px);
    box-shadow: 0 14px 40px rgba(246,127,0,0.55);
    background: #ff8e1a !important;
  }

  /* Radar sweep */
  @keyframes radar-sweep {
    0% { transform: rotate(0deg); opacity: 0; }
    10% { opacity: 1; }
    100% { transform: rotate(360deg); opacity: 0; }
  }
  .dlm-radar-sweep {
    animation: radar-sweep 4s linear infinite;
  }

  /* Ping animation */
  @keyframes ping {
    0% { transform: scale(1); opacity: 0.6; }
    100% { transform: scale(4); opacity: 0; }
  }
  .dlm-ping {
    animation: ping 2.5s ease-out infinite;
  }

  /* Scroll line indicator */
  .dlm-scroll-line {
    width: 1px;
    height: 40px;
    background: linear-gradient(to bottom, transparent, #F67F00);
    position: relative;
    overflow: hidden;
  }
  .dlm-scroll-line::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 12px;
    background: #fff;
    animation: scroll-down 2s ease-in-out infinite;
  }
  @keyframes scroll-down {
    0% { transform: translateY(-100%); }
    100% { transform: translateY(400%); }
  }

  /* Client card hover */
  .dlm-client-card:hover {
    transform: translateY(-6px);
    box-shadow: 0 14px 40px rgba(0,0,0,0.08);
  }
  .dlm-client-card:hover .dlm-client-underline {
    transform: scaleX(1);
  }

  /* Footer */
  .dlm-footer-link:hover { color: #F67F00 !important; }
  .dlm-social:hover {
    border-color: #F67F00 !important;
    color: #F67F00 !important;
    background: rgba(246,127,0,0.08);
  }

  /* Tweaks panel base */
  .tweaks-panel-card { z-index: 9999; }

  /* Responsive */
  @media (max-width: 960px) {
    .dlm-nav-desktop { display: none !important; }
    .dlm-burger { display: flex !important; }
    .dlm-services-grid { grid-template-columns: 1fr !important; }
    .dlm-about-grid { grid-template-columns: 1fr !important; gap: 60px !important; }
    .dlm-clients-grid { grid-template-columns: repeat(2, 1fr) !important; }
    .dlm-contact-grid { grid-template-columns: 1fr !important; gap: 48px !important; }
    .dlm-footer-grid { grid-template-columns: 1fr 1fr !important; gap: 40px !important; }
  }
  @media (max-width: 560px) {
    .dlm-clients-grid { grid-template-columns: 1fr !important; }
    .dlm-footer-grid { grid-template-columns: 1fr !important; }
  }
</style>

<script type="text/babel">

const __TWEAKS_STYLE = `
  .twk-panel{position:fixed;right:16px;bottom:16px;z-index:2147483646;width:280px;
    max-height:calc(100vh - 32px);display:flex;flex-direction:column;
    transform:scale(var(--dc-inv-zoom,1));transform-origin:bottom right;
    background:rgba(250,249,247,.78);color:#29261b;
    -webkit-backdrop-filter:blur(24px) saturate(160%);backdrop-filter:blur(24px) saturate(160%);
    border:.5px solid rgba(255,255,255,.6);border-radius:14px;
    box-shadow:0 1px 0 rgba(255,255,255,.5) inset,0 12px 40px rgba(0,0,0,.18);
    font:11.5px/1.4 ui-sans-serif,system-ui,-apple-system,sans-serif;overflow:hidden}
  .twk-hd{display:flex;align-items:center;justify-content:space-between;
    padding:10px 8px 10px 14px;cursor:move;user-select:none}
  .twk-hd b{font-size:12px;font-weight:600;letter-spacing:.01em}
  .twk-x{appearance:none;border:0;background:transparent;color:rgba(41,38,27,.55);
    width:22px;height:22px;border-radius:6px;cursor:default;font-size:13px;line-height:1}
  .twk-x:hover{background:rgba(0,0,0,.06);color:#29261b}
  .twk-body{padding:2px 14px 14px;display:flex;flex-direction:column;gap:10px;
    overflow-y:auto;overflow-x:hidden;min-height:0;
    scrollbar-width:thin;scrollbar-color:rgba(0,0,0,.15) transparent}
  .twk-body::-webkit-scrollbar{width:8px}
  .twk-body::-webkit-scrollbar-track{background:transparent;margin:2px}
  .twk-body::-webkit-scrollbar-thumb{background:rgba(0,0,0,.15);border-radius:4px;
    border:2px solid transparent;background-clip:content-box}
  .twk-body::-webkit-scrollbar-thumb:hover{background:rgba(0,0,0,.25);
    border:2px solid transparent;background-clip:content-box}
  .twk-row{display:flex;flex-direction:column;gap:5px}
  .twk-row-h{flex-direction:row;align-items:center;justify-content:space-between;gap:10px}
  .twk-lbl{display:flex;justify-content:space-between;align-items:baseline;
    color:rgba(41,38,27,.72)}
  .twk-lbl>span:first-child{font-weight:500}
  .twk-val{color:rgba(41,38,27,.5);font-variant-numeric:tabular-nums}
  .twk-sect{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;
    color:rgba(41,38,27,.45);padding:10px 0 0}
  .twk-sect:first-child{padding-top:0}
  .twk-field{appearance:none;box-sizing:border-box;width:100%;min-width:0;height:26px;padding:0 8px;
    border:.5px solid rgba(0,0,0,.1);border-radius:7px;
    background:rgba(255,255,255,.6);color:inherit;font:inherit;outline:none}
  .twk-field:focus{border-color:rgba(0,0,0,.25);background:rgba(255,255,255,.85)}
  select.twk-field{padding-right:22px;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path fill='rgba(0,0,0,.5)' d='M0 0h10L5 6z'/></svg>");
    background-repeat:no-repeat;background-position:right 8px center}
  .twk-slider{appearance:none;-webkit-appearance:none;width:100%;height:4px;margin:6px 0;
    border-radius:999px;background:rgba(0,0,0,.12);outline:none}
  .twk-slider::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;
    width:14px;height:14px;border-radius:50%;background:#fff;
    border:.5px solid rgba(0,0,0,.12);box-shadow:0 1px 3px rgba(0,0,0,.2);cursor:default}
  .twk-slider::-moz-range-thumb{width:14px;height:14px;border-radius:50%;
    background:#fff;border:.5px solid rgba(0,0,0,.12);box-shadow:0 1px 3px rgba(0,0,0,.2);cursor:default}
  .twk-seg{position:relative;display:flex;padding:2px;border-radius:8px;
    background:rgba(0,0,0,.06);user-select:none}
  .twk-seg-thumb{position:absolute;top:2px;bottom:2px;border-radius:6px;
    background:rgba(255,255,255,.9);box-shadow:0 1px 2px rgba(0,0,0,.12);
    transition:left .15s cubic-bezier(.3,.7,.4,1),width .15s}
  .twk-seg.dragging .twk-seg-thumb{transition:none}
  .twk-seg button{appearance:none;position:relative;z-index:1;flex:1;border:0;
    background:transparent;color:inherit;font:inherit;font-weight:500;min-height:22px;
    border-radius:6px;cursor:default;padding:4px 6px;line-height:1.2;
    overflow-wrap:anywhere}
  .twk-toggle{position:relative;width:32px;height:18px;border:0;border-radius:999px;
    background:rgba(0,0,0,.15);transition:background .15s;cursor:default;padding:0}
  .twk-toggle[data-on="1"]{background:#34c759}
  .twk-toggle i{position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;
    background:#fff;box-shadow:0 1px 2px rgba(0,0,0,.25);transition:transform .15s}
  .twk-toggle[data-on="1"] i{transform:translateX(14px)}
`;

function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-omelette-chrome=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
        </div>
      </div>
    </>
  );
}

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);

  if (!fitsAsSegments) {
    return (
      <TweakRow label={label}>
        <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
          {options.map((o) => {
            const v = typeof o === 'object' ? o.value : o;
            const l = typeof o === 'object' ? o.label : o;
            return <option key={v} value={v}>{l}</option>;
          })}
        </select>
      </TweakRow>
    );
  }

  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow, TweakRadio,
});
</script>

<script type="text/babel">

const DLM = {
  orange: '#F67F00',
  green: '#009F5F',
  greenDeep: '#006E42',
  greenDeeper: '#004D2D',
  gray: '#878787',
  black: '#1D1D1B',
  white: '#FFFFFF',
};

function DLMLogo({ variant = 'light', size = 1 }) {
  const fg = variant === 'light' ? '#FFFFFF' : DLM.black;
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 10 * size }}>
      <svg width={42 * size} height={42 * size} viewBox="0 0 42 42" fill="none">
        <circle cx="21" cy="21" r="19.5" stroke={DLM.orange} strokeWidth="2.5" fill="none" />
        <circle cx="21" cy="21" r="11" fill={DLM.green} />
        <circle cx="21" cy="21" r="5" fill={fg} />
        <circle cx="24" cy="18" r="1.8" fill="#FFFFFF" opacity="0.9" />
        <path d="M 8 13 Q 21 4, 34 13" stroke={DLM.orange} strokeWidth="2" fill="none" strokeLinecap="round" />
      </svg>
      <div style={{ lineHeight: 1, display: 'flex', flexDirection: 'column', gap: 2 }}>
        <span style={{
          fontFamily: 'Montserrat, sans-serif',
          fontWeight: 800,
          fontSize: 20 * size,
          color: fg,
          letterSpacing: '0.5px',
        }}>DLM</span>
        <span style={{
          fontFamily: 'Open Sans, sans-serif',
          fontWeight: 600,
          fontSize: 9 * size,
          color: variant === 'light' ? 'rgba(255,255,255,0.7)' : DLM.gray,
          letterSpacing: '1.2px',
          textTransform: 'uppercase',
        }}>Découvre Le Monde</span>
      </div>
    </div>
  );
}

function Header({ scrolled }) {
  const [open, setOpen] = React.useState(false);
  const links = [
    { label: 'Accueil', href: '#hero' },
    { label: 'Vidéo', href: '#video' },
    { label: 'Services', href: '#services' },
    { label: 'À propos', href: '#about' },
    { label: 'Ressources', href: '#ressources' },
    { label: 'Contact', href: '#contact' },
  ];
  return (
    <header style={{
      position: 'fixed', top: 0, left: 0, right: 0, zIndex: 100,
      padding: scrolled ? '14px 6%' : '22px 6%',
      background: scrolled ? 'rgba(0, 77, 45, 0.95)' : 'transparent',
      backdropFilter: scrolled ? 'blur(12px)' : 'none',
      borderBottom: scrolled ? '1px solid rgba(255,255,255,0.08)' : '1px solid transparent',
      display: 'flex', alignItems: 'center', justifyContent: 'space-between',
      transition: 'all 0.3s ease',
    }}>
      <a href="#hero" style={{ textDecoration: 'none' }}>
        <DLMLogo variant="light" />
      </a>
      <nav className="dlm-nav-desktop" style={{ display: 'flex', alignItems: 'center', gap: 36 }}>
        {links.map(l => (
          <a key={l.href} href={l.href} style={{
            color: '#fff', textDecoration: 'none',
            fontFamily: 'Open Sans, sans-serif',
            fontWeight: 600, fontSize: 15,
            letterSpacing: '0.3px',
            position: 'relative',
            padding: '6px 0',
          }} className="dlm-nav-link">{l.label}</a>
        ))}
        <a href="#contact" style={{
          background: DLM.orange,
          color: '#fff',
          padding: '11px 22px',
          borderRadius: 4,
          fontFamily: 'Montserrat, sans-serif',
          fontWeight: 700,
          fontSize: 14,
          textDecoration: 'none',
          letterSpacing: '0.5px',
          boxShadow: '0 4px 14px rgba(246,127,0,0.35)',
          transition: 'transform 0.2s, box-shadow 0.2s',
        }} className="dlm-cta-mini">Demander un devis</a>
      </nav>
      <button className="dlm-burger" onClick={() => setOpen(!open)} style={{
        background: 'transparent', border: 'none', color: '#fff',
        display: 'none', cursor: 'pointer', padding: 8,
      }}>
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
          {open ? <path d="M18 6L6 18M6 6l12 12" /> : <><path d="M3 6h18" /><path d="M3 12h18" /><path d="M3 18h18" /></>}
        </svg>
      </button>
      {open && (
        <div style={{
          position: 'absolute', top: '100%', left: 0, right: 0,
          background: DLM.greenDeeper,
          padding: '20px 6%',
          display: 'flex', flexDirection: 'column', gap: 16,
          borderTop: '1px solid rgba(255,255,255,0.1)',
        }}>
          {links.map(l => (
            <a key={l.href} href={l.href} onClick={() => setOpen(false)} style={{
              color: '#fff', textDecoration: 'none',
              fontFamily: 'Open Sans, sans-serif', fontWeight: 600, fontSize: 16,
            }}>{l.label}</a>
          ))}
        </div>
      )}
    </header>
  );
}

function HeroBackdrop({ variant }) {
  if (variant === 'radar') {
    return (
      <svg width="100%" height="100%" viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid slice"
        style={{ position: 'absolute', inset: 0, opacity: 0.55 }}>
        <defs>
          <radialGradient id="rgrad" cx="78%" cy="42%" r="55%">
            <stop offset="0%" stopColor={DLM.green} stopOpacity="0.45" />
            <stop offset="100%" stopColor={DLM.greenDeep} stopOpacity="0" />
          </radialGradient>
          <linearGradient id="sweep" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stopColor={DLM.orange} stopOpacity="0" />
            <stop offset="100%" stopColor={DLM.orange} stopOpacity="0.6" />
          </linearGradient>
        </defs>
        <rect width="1200" height="800" fill="url(#rgrad)" />
        {[80, 160, 260, 380, 520].map((r, i) => (
          <circle key={i} cx="950" cy="380" r={r}
            stroke={i === 2 ? DLM.orange : '#fff'} strokeOpacity={i === 2 ? 0.35 : 0.12}
            strokeWidth={i === 2 ? 1.5 : 1} fill="none" strokeDasharray={i % 2 === 0 ? '4 6' : ''} />
        ))}

function VideoSection() {
  const [playing, setPlaying] = React.useState(false);
  const videoRef = React.useRef(null);

  const toggle = () => {
    const v = videoRef.current;
    if (!v) return;
    if (v.paused) { v.play(); setPlaying(true); }
    else          { v.pause(); setPlaying(false); }
  };

  React.useEffect(() => {
    const v = videoRef.current;
    if (!v) return;
    const onEnd = () => setPlaying(false);
    v.addEventListener('ended', onEnd);
    return () => v.removeEventListener('ended', onEnd);
  }, []);

  return (
    <section id="video" style={{
      padding: '120px 6%',
      background: `linear-gradient(135deg, ${DLM.greenDeeper} 0%, ${DLM.greenDeep} 100%)`,

        <SectionHeader
          eyebrow="Notre structure en vidéo"
          title={<>Découvrez DLM <span style={{ color: DLM.orange }}>en images</span>.</>}

<script type="text/babel">
const TWEAK_DEFAULTS = {
  "heroBackdrop": "globe",
  "ctaVariant": "orange"
};

function App() {
  const [scrolled, setScrolled] = React.useState(false);
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);

  React.useEffect(() => {
    const onScroll = () => setScrolled(window.scrollY > 60);
    window.addEventListener('scroll', onScroll);
    return () => window.removeEventListener('scroll', onScroll);
  }, []);

  React.useEffect(() => {
    const els = document.querySelectorAll('.dlm-reveal');
    els.forEach((el) => {
      const r = el.getBoundingClientRect();
      if (r.top < window.innerHeight * 0.95) el.classList.add('is-visible');
    });
    const observer = new IntersectionObserver((entries) => {
      entries.forEach((e) => {
        if (e.isIntersecting) {
          e.target.classList.add('is-visible');
          observer.unobserve(e.target);
        }
      });
    }, { threshold: 0.12, rootMargin: '0px 0px -60px 0px' });
    els.forEach((el) => observer.observe(el));
    const fallback = setTimeout(() => {
      document.querySelectorAll('.dlm-reveal').forEach((el) => el.classList.add('is-visible'));
    }, 600);
    return () => { observer.disconnect(); clearTimeout(fallback); };
  }, [tweaks.heroBackdrop, tweaks.ctaVariant]);

  return (
    <>
      <Header scrolled={scrolled} />
      <Hero bgVariant={tweaks.heroBackdrop} />
      <VideoSection />
      <Services />
      <About />
      <Resources />
      <Clients />
      <Contact variant={tweaks.ctaVariant} />
      <Footer />

      <TweaksPanel title="Tweaks">
        <TweakSection label="Hero — motif de fond">
          <TweakRadio
            label="Style visuel"
            value={tweaks.heroBackdrop}
            onChange={(v) => setTweak('heroBackdrop', v)}
            options={[
              { value: 'radar', label: 'Radar' },
              { value: 'globe', label: 'Globe' },
              { value: 'grid', label: 'Grille' },
            ]}
          />
        </TweakSection>
        <TweakSection label="Section CTA finale">
          <TweakRadio
            label="Couleur de fond"
            value={tweaks.ctaVariant}
            onChange={(v) => setTweak('ctaVariant', v)}
            options={[
              { value: 'orange', label: 'Orange' },
              { value: 'green', label: 'Vert profond' },
            ]}
          />
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
